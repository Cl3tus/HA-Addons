name: Anti-Matter
version: "1.0.28"
slug: anti_matter
description: Store, organize and back up your Matter, HomeKit and Z-Wave pairing codes and QR payloads.
url: https://github.com/Cl3tus/Anti-Matter-HA
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false

# --- Ingress: appears in the HA sidebar, HA handles auth ---
ingress: true
ingress_port: 8099
panel_admin: false
panel_icon: mdi:qrcode-scan
panel_title: Anti-Matter

# --- Read-only access to HA (entities + areas via the Supervisor proxy) ---
homeassistant_api: true
hassio_api: false

# The vault + timestamped backups are stored in the add-on config folder,
# reachable over SAMBA at \\<HA-IP>\addon_configs\<slug> and included in HA backups.
map:
  - addon_config:rw
  - media:rw

# --- User options (Configuration tab; rendered as dropdowns with section headers) ---
#   Language : Auto (follow HA) | Nederlands | English
#   Theme    : Auto (follow HA) | Light | Dark
# Labels/descriptions are translated per HA language via translations/*.yaml
# (configuration.<group>.fields.*).
options:
  interface:
    language: Auto
    theme: Auto
  backup:
    keep_count: 10
schema:
  interface:
    language: list(Auto|Nederlands|English)
    theme: list(Auto|Light|Dark)
  backup:
    keep_count: int(1,100)
