name: E-ink Studio
version: "3.9.100"
slug: eink_studio
description: Visual editor for ESPHome e-ink displays — design your layout and generate the lambda + YAML.
url: https://github.com/Cl3tus/HA-Eink-Studio-App
arch:
  - aarch64
  - amd64
init: false

# --- Ingress: verschijnt in de HA-zijbalk, HA regelt de auth ---
ingress: true
ingress_port: 8099
panel_icon: mdi:image-edit
panel_title: E-ink Studio
panel_admin: true

# --- Live preview: lees-toegang tot HA-states via de Supervisor proxy ---
homeassistant_api: true
hassio_api: false

# Projects, fonts and profiles are stored in the add-on config folder,
# reachable over SAMBA at \\<HA-IP>\addon_configs\<slug>.
map:
  - addon_config:rw

# --- User options (Configuration tab; rendered as dropdowns) ---
#   Language : Auto (follow HA) | Nederlands | English
#   Theme    : Auto (follow HA) | Light | Dark
# Labels/descriptions are translated per HA language via translations/*.yaml.
options:
  language: Auto
  theme: Auto
  live_on_start: true
  live_interval: 1
  hide_unavailable: false
  # Default: every domain enabled. Uncheck the ones you don't want in the picker.
  entity_domains:
    - sensor
    - binary_sensor
    - weather
    - climate
    - sun
    - person
    - device_tracker
    - light
    - switch
    - number
    - input_number
    - input_boolean
    - input_text
    - input_select
    - input_datetime
    - input_button
    - media_player
    - cover
    - fan
    - lock
    - vacuum
    - update
    - button
    - camera
    - select
    - text
    - date
    - time
    - datetime
    - scene
    - script
    - automation
    - group
    - zone
    - counter
    - timer
    - schedule
    - calendar
    - remote
    - humidifier
    - water_heater
    - siren
    - valve
    - lawn_mower
    - alarm_control_panel
    - image
    - todo
    - event
    - notify
    - assist_satellite
schema:
  language: list(Auto|Nederlands|English)
  theme: list(Auto|Light|Dark)
  live_on_start: bool
  live_interval: int(0,1440)
  hide_unavailable: bool
  entity_domains:
    - list(sensor|binary_sensor|weather|climate|sun|person|device_tracker|light|switch|number|input_number|input_boolean|input_text|input_select|input_datetime|input_button|media_player|cover|fan|lock|vacuum|update|button|camera|select|text|date|time|datetime|scene|script|automation|group|zone|counter|timer|schedule|calendar|remote|humidifier|water_heater|siren|valve|lawn_mower|alarm_control_panel|image|todo|event|notify|assist_satellite)
